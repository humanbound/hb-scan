description: "Databricks API token (dapi prefix)"
references:
  - standard: "gitleaks"
    rule_id: "databricks-api-token"
match:
  target: any
  pattern: "\\b(dapi[a-f0-9]{32}(?:-\\d)?)\\b"
mitigation: |
  1. Revoke at Databricks Workspace > User Settings > Access Tokens

# ──────────────────────────────────────────────────────────────────────────────
# CUSTOMER SUPPORT / CRM
# ──────────────────────────────────────────────────────────────────────────────

---
id: zendesk-api-token
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Zendesk
secret_type: API Token
has_fixed_prefix: false
description: "Zendesk API token (keyword-contextual, 40 alphanum chars)"
references:
  - standard: "gitleaks"
    rule_id: "zendesk-secret-key"
match:
  target: any
  pattern: "(?i)(?:zendesk)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9]{40})(?:[\\x60'\"\\s;]|$)"
mitigation: |
  1. Rotate at Zendesk Admin > Channels > API > Settings
---
id: intercom-api-token
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Intercom
secret_type: API Token
has_fixed_prefix: false
description: "Intercom API token (keyword-contextual, 60 chars)"
references:
  - standard: "gitleaks"
    rule_id: "intercom-api-key"
match:
  target: any
  pattern: "(?i)(?:intercom)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-z0-9=_\\-]{60})(?:[\\x60'\"\\s;]|$)"
mitigation: |
  1. Rotate at app.intercom.com > Settings > Integrations > API Keys

