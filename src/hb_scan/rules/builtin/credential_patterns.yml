    rule_id: "cloudflare-origin-ca-key"
match:
  target: any
  pattern: "\\b(v1\\.0-[a-f0-9]{24}-[a-f0-9]{146})\\b"
mitigation: |
  1. Revoke and regenerate the Origin CA certificate in Cloudflare dashboard
---
id: vercel-access-token
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Vercel
secret_type: Access Token
has_fixed_prefix: true
description: "Vercel Access Token (bearer_ or vercel_ prefix patterns)"
match:
  target: any
  pattern: "(?i)\\b(vercel)(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|>|:{1,3}=|\\|\\||:|=>|\\?=|,)[\\x60'\"\\s=]{0,5}([a-zA-Z0-9]{24,})(?:[\\x60'\"\\s;]|\\\\[nr]|$)"
mitigation: |
  1. Revoke at vercel.com/account/tokens

