# ============================================================================
# Credential Detection Patterns — Prefix-Based (Low False Positive)
# ============================================================================
# Sources: gitleaks v8.25+, TruffleHog v3, detect-secrets (Yelp), GitGuardian
# Only patterns with distinctive prefixes or structural formats are included.
# Generic "any 32-char hex" patterns are excluded to avoid false positives.
#
# Each rule uses the hb-scan YAML format for integration with the scan engine.
# These patterns detect credentials in AI agent conversations (prompts/responses).
# ============================================================================

# ──────────────────────────────────────────────────────────────────────────────
# CLOUD PROVIDERS
# ──────────────────────────────────────────────────────────────────────────────

id: aws-access-key-id
version: 1
category: secret_exposure
severity: high
detection: regex
provider: AWS
secret_type: Access Key ID
has_fixed_prefix: true
description: "AWS Access Key ID (AKIA/ASIA/ABIA/ACCA prefix)"
references:
  - standard: "gitleaks"
    rule_id: "aws-access-token"
match:
  target: any
  pattern: "\\b((?:A3T[A-Z0-9]|AKIA|ASIA|ABIA|ACCA)[A-Z2-7]{16})\\b"
exclude:
  - pattern: "(EXAMPLE|example|AKIAIOSFODNN7EXAMPLE)"
mitigation: |
  1. Rotate the AWS access key immediately via IAM console
  2. Check CloudTrail for unauthorized usage
  3. Use IAM roles or SSM Parameter Store instead
---
id: aws-bedrock-api-key
version: 1
category: secret_exposure
severity: high
detection: regex
provider: AWS
secret_type: Amazon Bedrock API Key
has_fixed_prefix: true
description: "Long-lived Amazon Bedrock API key (ABSK prefix)"
references:
  - standard: "gitleaks"
    rule_id: "aws-amazon-bedrock-api-key-long-lived"
match:
  target: any
  pattern: "\\b(ABSK[A-Za-z0-9+/]{109,269}={0,2})\\b"
mitigation: |
  1. Rotate the Bedrock API key
  2. Use IAM roles for Bedrock access
---
id: azure-ad-client-secret
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Azure
secret_type: AD Client Secret
has_fixed_prefix: true
description: "Azure AD Client Secret (contains Q~ marker)"
references:
  - standard: "gitleaks"
    rule_id: "azure-ad-client-secret"
match:
  target: any
  pattern: "(?:^|[\\\\'\"`\\s>=:(,)])([a-zA-Z0-9_~.]{3}\\dQ~[a-zA-Z0-9_~.-]{31,34})(?:$|[\\\\'\"`\\s<),])"
mitigation: |
  1. Rotate the client secret in Azure Portal > App Registrations
  2. Use managed identities where possible
---
id: gcp-api-key
version: 1
category: secret_exposure
severity: high
detection: regex
provider: GCP
secret_type: API Key
has_fixed_prefix: true
description: "Google Cloud Platform API key (AIza prefix)"
references:
  - standard: "gitleaks"
    rule_id: "gcp-api-key"
match:
  target: any
  pattern: "\\b(AIza[\\w-]{35})\\b"
exclude:
  - pattern: "(AIzaSyabcdefghijklmnopqrstuvwxyz)"
mitigation: |
  1. Restrict or delete the API key in Google Cloud Console
  2. Use service accounts with least-privilege IAM roles
