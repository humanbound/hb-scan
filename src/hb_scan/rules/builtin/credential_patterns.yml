---
id: 1password-service-account-token
version: 1
category: secret_exposure
severity: high
detection: regex
provider: 1Password
secret_type: Service Account Token
has_fixed_prefix: true
description: "1Password service account token (ops_ prefix)"
references:
  - standard: "gitleaks"
    rule_id: "1password-service-account-token"
match:
  target: any
  pattern: "\\b(ops_eyJ[a-zA-Z0-9+/]{250,}={0,3})\\b"
mitigation: |
  1. Revoke at 1Password > Developer > Service Accounts
---
id: artifactory-api-key
version: 1
category: secret_exposure
severity: high
detection: regex
provider: JFrog Artifactory
secret_type: API Key
has_fixed_prefix: true
description: "JFrog Artifactory API key (AKCp prefix)"
references:
  - standard: "gitleaks"
    rule_id: "artifactory-api-key"
match:
  target: any
  pattern: "\\b(AKCp[A-Za-z0-9]{69})\\b"
mitigation: |
  1. Revoke at Artifactory > User Profile > API Key
---
id: postman-api-token
version: 1
category: secret_exposure
severity: medium
detection: regex
provider: Postman
secret_type: API Key
has_fixed_prefix: true
description: "Postman API key (PMAK- prefix)"
references:
  - standard: "gitleaks"
    rule_id: "postman-api-token"
match:
  target: any
  pattern: "\\b(PMAK-[a-f0-9]{24}-[a-f0-9]{34})\\b"
mitigation: |
  1. Regenerate at postman.co > Settings > API Keys
---
id: dynatrace-api-token
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Dynatrace
secret_type: API Token
has_fixed_prefix: true
description: "Dynatrace API token (dt0c01. prefix)"
references:
  - standard: "gitleaks"
    rule_id: "dynatrace-api-token"
match:
  target: any
  pattern: "\\b(dt0c01\\.[a-zA-Z0-9]{24}\\.[a-zA-Z0-9]{64})\\b"
mitigation: |
  1. Revoke at Dynatrace > Settings > Integration > API Tokens
---
id: snyk-api-token
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Snyk
secret_type: API Token
has_fixed_prefix: false
description: "Snyk API token (keyword-contextual, UUID format)"
references:
  - standard: "gitleaks"
    rule_id: "snyk-api-token"
match:
  target: any
  pattern: "(?i)(?:snyk[_.-]?(?:(?:api|oauth)[_.-]?)?(?:key|token))(?:[ \\t\\w.-]{0,20})[\\s'\"]{0,3}(?:=|:|=>)[\\x60'\"\\s=]{0,5}([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\\x60'\"\\s;]|$)"
mitigation: |
  1. Revoke at snyk.io/account
---
id: mailchimp-api-key
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Mailchimp
secret_type: API Key
has_fixed_prefix: true
description: "Mailchimp API key (32 hex chars + -usXX datacenter suffix)"
references:
  - standard: "gitleaks"
    rule_id: "mailchimp-api-key"
match:
  target: any
  pattern: "\\b([a-f0-9]{32}-us\\d{1,2})\\b"
mitigation: |
  1. Revoke at mailchimp.com > Account > Extras > API Keys
---
id: age-secret-key
version: 1
category: secret_exposure
severity: high
detection: regex
provider: age (encryption)
secret_type: Secret Key
has_fixed_prefix: true
description: "age encryption secret key (AGE-SECRET-KEY-1 prefix)"
references:
  - standard: "gitleaks"
    rule_id: "age-secret-key"
match:
  target: any
  pattern: "\\b(AGE-SECRET-KEY-1[QPZRY9X8GF2TVDW0S3JN54KHCE6MUA7L]{58})\\b"
mitigation: |
  1. Generate a new key pair with age-keygen
  2. Re-encrypt any data that used this key
---
id: private-key-block
version: 2
category: secret_exposure
severity: high
detection: regex
provider: Generic
secret_type: Private Key (PEM)
has_fixed_prefix: true
description: "PEM-encoded private key block (RSA, EC, Ed25519, etc.)"
references:
  - standard: "gitleaks"
    rule_id: "private-key"
match:
  target: any
  pattern: "-----BEGIN[ A-Z0-9_-]{0,100}PRIVATE KEY(?: BLOCK)?-----"
mitigation: |
  1. Regenerate the key pair immediately
  2. Revoke the old public key from all authorized locations
---
id: jwt-token
version: 2
category: secret_exposure
severity: high
detection: regex
provider: Generic
secret_type: JSON Web Token
has_fixed_prefix: true
description: "JWT token (eyJ base64 header.payload.signature)"
references:
  - standard: "gitleaks"
    rule_id: "jwt"
match:
  target: any
  pattern: "\\b(ey[a-zA-Z0-9]{17,}\\.ey[a-zA-Z0-9/\\\\_-]{17,}\\.(?:[a-zA-Z0-9/\\\\_-]{10,}={0,2})?)\\b"
exclude:
  - pattern: "(eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\\.eyJzdWIiOiIxMjM0NTY3ODkwIiw)"
    comment: "jwt.io example token"
mitigation: |
  1. Check token expiration — revoke if still valid
  2. Rotate the signing key if the JWT secret was also exposed
---
id: database-connection-string
version: 2
category: secret_exposure
severity: high
detection: regex
provider: Generic
secret_type: Connection String with Credentials
has_fixed_prefix: true
description: "Database connection string with embedded credentials (Postgres, MySQL, AMQP)"
match:
  target: any
  pattern: "(postgres|mysql|amqp)://[^\\s:]+:[^\\s@]+@[^\\s]+"
exclude:
  - pattern: "(example|localhost|127\\.0\\.0\\.1|<password>|your_password|password)"
mitigation: |
  1. Rotate database credentials immediately
  2. Use environment variables or secrets managers
---
id: microsoft-teams-webhook
version: 1
category: secret_exposure
severity: high
detection: regex
provider: Microsoft Teams
secret_type: Incoming Webhook URL
has_fixed_prefix: true
description: "Microsoft Teams webhook URL"
references:
  - standard: "gitleaks"
    rule_id: "microsoft-teams-webhook"
match:
  target: any
  pattern: "https://[a-z0-9]+\\.webhook\\.office\\.com/webhookb2/[a-z0-9-]+@[a-z0-9-]+/IncomingWebhook/[a-z0-9]{32}/[a-z0-9-]+"
mitigation: |
  1. Delete and recreate the connector in Teams channel settings
---
