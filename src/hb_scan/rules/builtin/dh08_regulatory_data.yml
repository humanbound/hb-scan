id: regulatory-semantic-analysis
version: 1
category: regulatory_data_exposure
severity: high
detection: llm
description: "Deep analysis for any regulated data category"
judge:
  prompt: |
    Analyze this conversation. Does the user share data that falls under
    regulatory protection? Consider GDPR, HIPAA, SOX/SEC, attorney-client
    privilege, FERPA. Only flag actual regulated data, not discussions about
    regulations or compliance frameworks.
  model: user_configured
mitigation: |
  1. Conduct DPIA before deploying AI tools with regulated data
  2. Implement data classification and enforce per-category AI policies
