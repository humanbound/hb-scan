id: attorney-client-privilege
version: 3
category: regulatory_data_exposure
severity: high
detection: llm
description: "Attorney-client privileged content shared with AI — requires semantic analysis"
references:
  - standard: "ABA Formal Opinion 512 (July 2024)"
    url: "https://www.americanbar.org/news/abanews/aba-news-archives/2024/07/aba-issues-first-ethics-guidance-ai-tools/"
judge:
  prompt: |
    Does this conversation contain actual attorney-client privileged content?
    Look for: legal advice about a specific case/client, work product,
    communications marked as privileged. Exclude discussions about privilege
    as a legal concept or taxonomy category.
  model: user_configured
mitigation: |
  1. ABA Opinion 512: boilerplate consent is NOT adequate for AI usage
  2. Lawyers must understand how AI tools process client data
  3. Use enterprise AI with verifiable data handling guarantees
