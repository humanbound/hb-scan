id: gdpr-personal-data
version: 3
category: regulatory_data_exposure
severity: high
detection: llm
description: "GDPR-relevant personal data shared with AI — requires semantic analysis"
references:
  - standard: "GDPR Art. 5(1)(c): Data Minimization"
    url: "https://www.activemind.legal/guides/chatgpt/"
  - standard: "Italy Garante: EUR 15M fine to OpenAI"
    url: "https://www.lewissilkin.com/en/insights/2025/01/14/openai-faces-15-million-fine-as-the-italian-garante-strikes-again-102jtqc"
judge:
  prompt: |
    Does this conversation contain actual personal data (real names with email,
    phone, address, DOB, or national ID)? Exclude test data, examples, and
    discussions about GDPR. Only flag real personal data of real individuals.
  model: user_configured
mitigation: |
  1. De-identify personal data before using AI tools
  2. Ensure GDPR-compliant DPA with AI vendor (Art. 28)
  3. Italy fined OpenAI EUR 15M for GDPR violations in 2024
---
id: hipaa-health-data
version: 3
category: regulatory_data_exposure
severity: high
detection: llm
description: "HIPAA-protected health information shared with AI — requires semantic analysis"
references:
  - standard: "HIPAA BAA Requirement"
    url: "https://www.hipaajournal.com/when-ai-technology-and-hipaa-collide/"
judge:
  prompt: |
    Does this conversation contain actual protected health information (PHI)?
    Look for: patient names with diagnosis, treatment plans, prescription details,
    medical record numbers. Exclude discussions about HIPAA compliance or
    debugging context using the word "diagnosis."
  model: user_configured
mitigation: |
  1. Public AI tools are NOT HIPAA-compliant (no BAAs)
  2. Use HIPAA-certified AI solutions for health data
  3. PHI entered into AI tools cannot be recouped
---
id: financial-mnpi
version: 3
category: regulatory_data_exposure
severity: high
detection: llm
description: "Material non-public financial information shared with AI — requires semantic analysis"
references:
  - standard: "SEC Rule 10b-5, Regulation FD"
    url: "https://www.smarsh.com/compliance-glossary/material-non-public-information/"
judge:
  prompt: |
    Does this conversation contain material non-public information (MNPI)?
    Look for: unreleased earnings, upcoming M&A, insider trading context.
    Exclude discussions about MNPI as a concept or regulatory framework.
  model: user_configured
mitigation: |
  1. Never share MNPI with AI tools
  2. Ensure compliance with SEC/FINRA supervision requirements
  3. AI tools lack the audit trails required for MNPI handling
