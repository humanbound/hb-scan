id: education-records
version: 2
category: regulatory_data_exposure
severity: high
detection: llm
description: "FERPA-protected education records shared with AI — requires semantic analysis"
judge:
  prompt: |
    Does this conversation contain actual student education records?
    Look for: student names with grades, transcripts, enrollment status,
    disciplinary records. Exclude general discussions about FERPA.
  model: user_configured
mitigation: |
  1. De-identify student records before AI processing
  2. FERPA requires consent for disclosure of education records
