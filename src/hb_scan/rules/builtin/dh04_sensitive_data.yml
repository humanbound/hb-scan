id: env-file-contents
version: 2
category: sensitive_data_sharing
severity: high
detection: regex
description: "Environment file with secrets shared in conversation"
references:
  - standard: "OWASP LLM02:2025"
    url: "https://genai.owasp.org/llmrisk/llm022025-sensitive-information-disclosure/"
  - standard: "Samsung ChatGPT Incident 2023"
    url: "https://cybernews.com/security/chatgpt-samsung-leak-explained-lessons/"
match:
  # Only match in user prompts or tool output (actual file content read by AI)
  # Not in assistant responses (could be discussing env vars)
  target: user_prompt
  pattern: "(DB_PASSWORD|DATABASE_URL|MONGO_URI|REDIS_URL|API_SECRET|SECRET_KEY|PRIVATE_KEY|AWS_SECRET_ACCESS_KEY|AWS_SESSION_TOKEN|OPENAI_API_KEY|ANTHROPIC_API_KEY|AZURE_OPENAI_API_KEY|GOOGLE_API_KEY|COHERE_API_KEY|HUGGINGFACE_TOKEN|HF_TOKEN|REPLICATE_API_TOKEN|MISTRAL_API_KEY|DEEPSEEK_API_KEY|GROQ_API_KEY|TOGETHER_API_KEY|STRIPE_SECRET_KEY|STRIPE_API_KEY|TWILIO_AUTH_TOKEN|SENDGRID_API_KEY|MAILGUN_API_KEY|SLACK_BOT_TOKEN|SLACK_WEBHOOK|DISCORD_TOKEN|TELEGRAM_BOT_TOKEN|SENTRY_DSN|DATADOG_API_KEY|NEW_RELIC_LICENSE_KEY|GRAFANA_API_KEY|PAGERDUTY_TOKEN|AUTH0_CLIENT_SECRET|FIREBASE_API_KEY|CLERK_SECRET_KEY|SUPABASE_KEY|LANGFUSE_SECRET_KEY|LANGCHAIN_API_KEY|PINECONE_API_KEY|WEAVIATE_API_KEY)\\s*=\\s*['\"]?[^\\s'\"]{6,}"
exclude:
  - pattern: "(os\\.getenv|getenv|environ|process\\.env|\\$\\{|\\$[A-Z_])"
  - pattern: "(example|placeholder|your[_-]|<[a-z-]+>|\\.\\.\\.)"
mitigation: |
  1. Never share .env file contents with AI tools
  2. Use .gitignore and AI tool exclusion patterns for .env files
  3. Reference environment variables by name, not by value
---
id: ssh-key-path-shared
version: 3
category: sensitive_data_sharing
severity: high
detection: llm
description: "SSH private key file read by AI tool"
match:
  # Only match when AI actually reads the file, not text mentioning the path
  target: tool_input
  pattern: "\\.ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa)(?!\\.pub)"
exclude:
  - pattern: "(serialization|Encoding|cryptography|x509|certificate)"
  - pattern: "(example|redact|REDACT|mask)"
mitigation: |
  1. Never share SSH private keys with AI tools
  2. Use SSH agent forwarding instead of copying keys
---
id: cloud-credentials-file
version: 2
category: sensitive_data_sharing
severity: high
detection: regex
description: "Cloud service credentials file read by AI tool"
match:
  # Only match when AI actually reads the file via tool call
  target: tool_input
  pattern: "(file_path|path).*\\b(credentials\\.json|service[_-]account.*\\.json)"
mitigation: |
  1. Use IAM roles and instance profiles instead of credential files
  2. Exclude credential files from AI tool context
---
id: ssn-pattern
version: 1
category: sensitive_data_sharing
severity: high
detection: regex
description: "Social Security Number pattern found in user prompt"
references:
  - standard: "NIST AI 600-1 §2.4: Data Privacy"
    url: "https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf"
match:
  target: user_prompt
  pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
exclude:
  - pattern: "000-00-0000"
  - pattern: "123-45-6789"
  - pattern: "(example|test|sample|placeholder)"
mitigation: |
  1. Never share PII with AI tools
  2. De-identify data before using AI for analysis
  3. Use synthetic data for development and testing
---
id: credit-card-pattern
version: 1
category: sensitive_data_sharing
severity: high
detection: regex
description: "Credit card number pattern found in user prompt"
match:
  target: user_prompt
  pattern: "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\\b"
mitigation: |
  1. Never share payment card data with AI tools
  2. Use tokenized or masked card numbers for testing
---
id: internal-document-marker
version: 2
category: sensitive_data_sharing
severity: medium
detection: regex
description: "Content marked as internal/confidential shared in user prompt"
match:
  target: user_prompt
  # Require the keyword near actual content (not just mentioning the word)
  # Must be at start of line or after whitespace (not mid-sentence discussion)
  pattern: "^\\s*(CONFIDENTIAL|INTERNAL ONLY|DO NOT DISTRIBUTE|NOT FOR DISTRIBUTION)\\b"
exclude:
  - pattern: "(example|should we|what about|how to|detect|scan|category|taxonomy)"
mitigation: |
  1. Remove classification markers and sensitive content before sharing with AI
  2. Use only public or de-classified information in AI prompts
---
id: database-dump-content
version: 2
category: sensitive_data_sharing
severity: high
detection: regex
description: "Database dump content (INSERT with real data) shared in conversation"
match:
  target: user_prompt
  pattern: "INSERT INTO\\s+\\w+\\s*\\([^)]{20,}\\)\\s*VALUES\\s*\\([^)]*['\"][^'\"]{10,}['\"]"
exclude:
  - pattern: "(migration|Migration|CREATE TABLE|ALTER TABLE|DO \\$\\$|DECLARE)"
  - pattern: "(test|fixture|seed|example|mock|sample|gen_random_uuid)"
mitigation: |
  1. Use anonymized or synthetic data for AI-assisted database work
  2. Never share production data dumps with AI tools
