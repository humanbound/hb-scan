# DH-01: Secret Exposure — Supplementary rules
# Core credential patterns are in credential_patterns.yml (102 rules from gitleaks/trufflehog)
# This file contains context-specific rules not covered by prefix-based detection.

id: generic-api-key
version: 3
category: secret_exposure
severity: high
detection: regex
description: "API key with actual value found in user prompt"
match:
  target: user_prompt
  pattern: "(api_key|apikey|api-key|api_secret|API_KEY)\\s*[=:]\\s*['\"][A-Za-z0-9_-]{20,}['\"]"
exclude:
  - pattern: "(your[_-]|example|test|fake|dummy|placeholder|changeme|invalid)"
  - pattern: "(os\\.getenv|getenv|environ|process\\.env|\\$\\{|\\$[A-Z_])"
  - pattern: "ApiKey(Create|Update|Response|Insert)"
mitigation: |
  1. Rotate the exposed API key
  2. Use a secrets manager or environment variables
---
id: generic-password-assignment
version: 3
category: secret_exposure
severity: medium
detection: regex
description: "Password value found in user prompt"
match:
  target: user_prompt
  pattern: "(password|passwd|pwd)\\s*[=:]\\s*['\"]([^'\"]{8,})['\"]"
exclude:
  - pattern: "(os\\.getenv|getenv|environ|process\\.env|\\$\\{|\\$[A-Z_])"
  - pattern: "(example|test|dummy|fake|placeholder|changeme|your_|xxx|\\*\\*\\*)"
  - pattern: "password\\s*=\\s*['\"]\\s*['\"]"
mitigation: |
  1. Use environment variables or secrets manager instead of pasting passwords
  2. If the password was shared, rotate it
---
id: bearer-token
version: 3
category: secret_exposure
severity: high
detection: regex
description: "Bearer authorization token found in user prompt"
match:
  target: user_prompt
  pattern: "Bearer\\s+[A-Za-z0-9_.-]{20,}"
exclude:
  - pattern: "(invalid|fake|test|example|placeholder|your[_-]|<[A-Z_]+>)"
mitigation: |
  1. Revoke or rotate the token
  2. Use short-lived tokens with automatic refresh
